# Apprenticeship to O*NET-SOC mappings for AGC Maine-sponsored programs.
#
# Curated against Chalkline's 60-code O*NET reference set because the
# `rapids_code` values in the AGC workbook are internal tracking numbers,
# not federal RAPIDS IDs. The O*NET Apprenticeship_RAPIDS_to_ONET-SOC
# crosswalk at https://www.onetcenter.org/crosswalks/rapids/ keys on a
# different RAPIDS numbering scheme, so title-based judgment is the
# cleanest route for 19 apprenticeships. Each mapping is the closest-fit
# SOC among the reference set; flagged ambiguous cases
# (*Construction Specialist, Concrete Laborer, Heavy/Highway Laborer*) are
# documented in `docs/comments/CL-16.md`.

"595"   = "37-3013.00"  # Arborist                                → Tree Trimmers & Pruners
"90046" = "47-2111.00"  # Electrician                             → Electricians
"90050" = "47-2073.00"  # Construction Equipment Operator         → Operating Engineers
"90380" = "47-2031.00"  # Bridge Carpenter/Heavy Highway          → Carpenters
"90415" = "47-2031.00"  # Construction Carpenter                  → Carpenters
