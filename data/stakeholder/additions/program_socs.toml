# Program to O*NET-SOC mappings for AGC Maine-relevant training programs.
#
# Derived from the NCES Classification of Instructional Programs (CIP 2020)
# crosswalked to O*NET-SOC via the O*NET Center Education CIP to O*NET-SOC
# Crosswalk (July 2024): https://www.onetcenter.org/crosswalks/cip/.
#
# Each program's SOC list is the intersection of the crosswalk's recommended
# SOCs with Chalkline's 60-code reference set. AAS degrees legitimately span
# multiple trades, so programs are one-to-many. Maine-specific initiatives
# without federal CIP equivalents (Alfond Center, Maine Construction Academy,
# Workforce Development Compact, TREC, Transfer ME, Advanced Technology
# Centers) are hand-mapped to closest applicable CIP analogues — e.g.,
# Alfond Center's trades track maps to `46.0 Construction Trades, General`
# plus the specific trades Alfond teaches.

# ── Community college AAS degrees + certificates ─────────────────────────

