[info]
text = '''
The career graph is a **stepwise k-NN backbone** where each node represents one of the {n_clusters} career families and edges connect roles at the same Job Zone (*lateral moves*) or one level up (*advancement paths*). Edge weights are cosine similarities between cluster centroids in SVD-reduced space, meaning stronger connections indicate roles whose job postings use more similar language.

Credentials are attached to edges via a **dual-threshold cosine filter** that matches each credential's embedding text against both the source and target cluster centroids, requiring similarity above $\tau = 0.3$ on both ends to qualify as a bridge credential.

The **career ladder** positions all families in your sector by O\*NET Job Zone, showing which roles sit at the same experience level and which require stepping up. Edge weights in the network reflect how similar the job postings are between connected families, so stronger connections represent more natural career transitions where your existing skills transfer most readily. Credentials are categorized as **apprenticeships** (*earn-while-you-learn DOL-registered programs*), **educational programs** (*community college and university degrees*), or **certifications** (*industry-recognized credentials from CareerOneStop*).'''

