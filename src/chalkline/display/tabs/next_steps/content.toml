empty_message = "No training pathways found for this cluster."

[info]
text = '''
Credentials bridge career transitions in the pathway graph. Each credential (*apprenticeship, certification, or educational program*) has pre-computed **embedding text** that describes its content. The pipeline encodes this text with the same sentence transformer used on job postings, then applies a **dual-threshold cosine filter** requiring similarity above $\tau = 0.3$ against both the source and destination cluster centroids for the credential to qualify as a bridge.

**RAPIDS codes** are Department of Labor registered apprenticeship identifiers, distinct from O\*NET SOC codes. The minimum hour requirements shown are from Maine's registered apprenticeship programs through AGC. Employers are matched to the **AGC Maine member directory** using fuzzy string matching, meaning slight name variations between job board listings and the membership roll still resolve correctly. The wage ladder shows **BLS OEWS median annual wages** for career families reachable via advancement paths from your selected family.'''

